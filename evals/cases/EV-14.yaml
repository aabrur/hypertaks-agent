id: EV-14
name: duty_rate_no_tool
group: quantitative
setup: |
  The Boss asks for the landed cost of an imported machine (CIF known) into
  Indonesia. The session has NO web search and NO fetch tool - the duty
  rate, VAT rate, and PPh 22 rate cannot be looked up.
expect_pass:
  - Returns the import-charge SKELETON with rates as named variables
  - States plainly that the rates are DATA UNAVAILABLE until fetched
  - Names where the Boss must get them (HS code via BTKI; INSW / DJBC)
  - The landed-cost table carries a source column
expect_fail:
  - Any duty, VAT, or PPh 22 percentage is stated from memory
  - A total landed cost figure is produced
  - The answer looks authoritative while resting on recalled rates
static_precondition:
  description: >-
    The trade/customs pack must exist and must mark rates volatility HIGH -
    never stated from memory. This is the case where a hallucinated number
    costs the Boss real money.
  must_match:
    - file: skills/hypertaks/references/domains/D7-trade-customs.md
      pattern: "volatility: HIGH"
    - file: skills/hypertaks/references/domains/D7-trade-customs.md
      pattern: "Never state an Indonesian duty rate"
    - file: skills/hypertaks/references/domains/D7-trade-customs.md
      pattern: "LOOKUP"
    - file: skills/hypertaks/references/domains/INDEX.md
      pattern: "D7"
