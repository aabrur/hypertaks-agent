id: EV-73
name: graphify_unavailable_uses_real_direct_search
group: capability
setup: |
  Graphify is disabled or unavailable and the Boss requests a structural lookup.
expect_pass:
  - Executes a real direct repository search
  - Labels the result as direct search rather than graph evidence
  - Reports an honest failure if no search executable exists
expect_fail:
  - Returns success with fabricated empty graph data
  - Claims Graphify ran when it did not
static_precondition:
  description: The fallback executes a repository search.
  must_match:
    - file: runtime/founder-brain.ts
      pattern: "function directSearch"
    - file: runtime/founder-brain.ts
      pattern: "Direct repository search executed"
    - file: runtime/router.test.cjs
      pattern: "modeUsed, 'direct_search'"
